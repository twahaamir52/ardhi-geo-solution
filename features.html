<style>
:root {
  --ink: #0a1512;
  --ink-soft: #1e3530;
  --sage: #2d6a5e;
  --sage-mid: #3a8575;
  --sage-light: #5db5a0;
  --mint: #e4f5f1;
  --mint-dark: #c1e8df;
  --gold: #d4a843;
  --gold-light: #f5e9c5;
  --white: #fafefe;
  --surface: #f3faf8;
  --border: #c5e2db;
  --muted: #4d7068;
  --flag-green: #1eb53a;
  --flag-yellow: #fcd116;
  --flag-black: #111;
  --radius: 20px;
  --shadow-sm: 0 2px 12px rgba(10,21,18,0.07);
  --shadow-md: 0 8px 32px rgba(10,21,18,0.12);
  --shadow-lg: 0 20px 64px rgba(10,21,18,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--white);
  min-height: 100vh;
  color: var(--ink);
  overflow-x: hidden;
}

/* ═══════════════ TZ FLAG BAR ═══════════════ */
.tz-flag-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 1000;
  background: linear-gradient(90deg,
    var(--flag-green) 0%, var(--flag-green) 29%,
    var(--flag-yellow) 29%, var(--flag-yellow) 34.5%,
    var(--flag-black) 34.5%, var(--flag-black) 65.5%,
    var(--flag-yellow) 65.5%, var(--flag-yellow) 71%,
    var(--flag-green) 71%, var(--flag-green) 100%);
}

  padding: 72px 32px 60px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom, rgba(6,21,16,0.62) 0%, rgba(6,21,16,0.75) 100%),
    radial-gradient(ellipse 70% 60% at 80% 20%, rgba(93,181,160,0.15) 0%, transparent 60%);
  pointer-events: none;
}

.hero-grid {
  display: grid;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  position: absolute; inset: 0;
  pointer-events: none;
}

.hero-inner {
  max-width: 1080px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  color: var(--sage-light);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: 40px;
  margin-bottom: 22px;
}

.hero-eyebrow-dot {
  width: 6px; height: 6px;
  background: var(--sage-light);
  border-radius: 50%;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(93,181,160,0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(93,181,160,0); }
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.4rem, 5vw, 4rem);
  font-weight: 700;
  color: white;
  line-height: 1.1;
  margin-bottom: 14px;
  letter-spacing: -0.01em;
}

.hero h1 span {
  color: var(--gold);
}

.hero-sub {
  color: rgba(255,255,255,0.6);
  font-size: 1rem;
  font-weight: 300;
  max-width: 520px;
  line-height: 1.7;
  margin-bottom: 40px;
}

/* ═══════════════ STATS STRIP ═══════════════ */
.stats-strip {
  display: flex;
  gap: 1px;
  background: rgba(255,255,255,0.08);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  max-width: 680px;
}

.stat-cell {
  flex: 1;
  padding: 16px 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
  transition: background 0.2s;
}

.stat-cell:hover {
  background: rgba(255,255,255,0.09);
}

.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: white;
  line-height: 1;
}

.stat-lbl {
  font-size: 0.66rem;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* ═══════════════ MAIN CONTENT ═══════════════ */
.main {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ═══════════════ TOOLBAR ═══════════════ */
.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  align-items: center;
  flex-wrap: wrap;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 240px;
}

.search-box input {
  width: 100%;
  padding: 12px 18px 12px 46px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: white;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box input:focus {
  border-color: var(--sage-mid);
  box-shadow: 0 0 0 3px rgba(58,133,117,0.12);
}

.search-ico {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 1rem;
  pointer-events: none;
}

.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-pill {
  padding: 9px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.filter-pill:hover {
  border-color: var(--sage-mid);
  color: var(--sage);
  background: var(--mint);
}

.filter-pill.active {
  background: var(--sage);
  color: white;
  border-color: var(--sage);
}

.count-tag {
  font-size: 0.75rem;
  color: var(--muted);
  margin-left: auto;
  white-space: nowrap;
  align-self: center;
}

/* ═══════════════ PROJECT GRID ═══════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap: 24px;
}

/* ═══════════════ CARD ═══════════════ */
.card {
  background: white;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1), box-shadow 0.3s;
  animation: riseIn 0.45s ease both;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: var(--sage-light);
}

/* Card scene (SVG banner) */
.card-scene {
  position: relative;
  height: 190px;
  overflow: hidden;
}

.card-scene svg {
  width: 100%;
  height: 100%;
  display: block;
}

.scene-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.35) 100%);
}

/* Floating badges on scene */
.badge-status {
  position: absolute;
  top: 12px;
  left: 14px;
  font-size: 0.64rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 30px;
}

.badge-status.active   { background: #d1fae5; color: #065f46; }
.badge-status.completed { background: #dbeafe; color: #1e40af; }
.badge-status.ongoing  { background: #fef3c7; color: #92400e; }

.badge-id {
  position: absolute;
  top: 12px;
  right: 14px;
  background: rgba(0,0,0,0.5);
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  padding: 4px 9px;
  border-radius: 6px;
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  gap: 5px;
}

.live-dot {
  width: 5px; height: 5px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%  { opacity:0.5; transform:scale(0.7); }
}

/* Card progress bar (in scene) */
.scene-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: rgba(255,255,255,0.2);
}

.scene-progress-fill {
  height: 100%;
  background: var(--gold);
  transition: width 1s ease;
}

/* Card body */
.card-body {
  padding: 20px 24px 22px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card-category {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--mint);
  color: var(--sage);
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  width: fit-content;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.card-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.meta-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.76rem;
  color: var(--muted);
}

.meta-chip strong {
  color: var(--sage);
  font-weight: 600;
}

.card-desc {
  font-size: 0.84rem;
  color: var(--muted);
  line-height: 1.7;
}

/* Achievements */
.achievements {
  background: var(--surface);
  border: 1px solid var(--mint-dark);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.ach-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--ink-soft);
  line-height: 1.5;
}

.ach-check {
  width: 16px; height: 16px;
  background: var(--sage);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.ach-check svg {
  width: 9px; height: 9px;
  stroke: white;
  stroke-width: 2.5;
  fill: none;
}

/* DB record table */
.db-record {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.db-record-head {
  background: var(--sage);
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.64rem;
  letter-spacing: 0.1em;
  padding: 7px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.db-record table {
  width: 100%;
  border-collapse: collapse;
}

.db-record td {
  font-size: 0.76rem;
  padding: 6px 12px;
  border-bottom: 1px solid var(--mint);
}

.db-record tr:last-child td {
  border-bottom: none;
}

.db-record td:first-child {
  color: var(--muted);
  font-weight: 500;
  width: 38%;
}

.db-record td:last-child {
  color: var(--ink);
  font-weight: 500;
}

.db-record td code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  background: var(--mint);
  color: var(--sage);
  padding: 1px 6px;
  border-radius: 4px;
}

/* Tool tags */
.tools-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.tool-tag {
  font-size: 0.68rem;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.15s;
}

.tool-tag:hover {

  border-color: var(--sage-light);
  color: var(--sage);
}

.card-divider {
  height: 1px;
  background: var(--border);
  margin: 2px 0;
}

/* CTA button */
.cta-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 13px 18px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  margin-top: auto;
}

.cta-btn:hover {
  background: var(--sage);
  transform: translateY(-1px);
}

.cta-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cta-updates {
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 2px 8px;
  font-size: 0.68rem;
  font-weight: 500;
}

.cta-arrow {
  font-size: 1.1rem;
  transition: transform 0.2s;
}

.cta-btn:hover .cta-arrow {
  transform: translateX(4px);
}

/* No results */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
}

.no-results .nr-icon {
  font-size: 3.5rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

.no-results p {
  font-size: 1.05rem;
}

/* ═══════════════ MODAL ═══════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(6, 20, 17, 0.75);
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: white;
  border-radius: 24px;
  width: 100%;
  max-width: 800px;
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 32px 100px rgba(0,0,0,0.4);
  transform: translateY(40px) scale(0.96);
  transition: transform 0.38s cubic-bezier(0.34, 1.4, 0.64, 1);
}

.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal::-webkit-scrollbar { width: 5px; }
.modal::-webkit-scrollbar-track { background: var(--surface); }
.modal::-webkit-scrollbar-thumb { background: var(--sage-light); border-radius: 3px; }

/* Modal hero */
.modal-hero {
  height: 240px;
  position: relative;
  overflow: hidden;
}

.modal-hero svg {
  width: 100%;
  height: 100%;
  display: block;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 36px; height: 36px;
  background: rgba(0,0,0,0.5);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  transition: background 0.2s, transform 0.2s;
  z-index: 10;
}

.modal-close:hover {
  background: rgba(0,0,0,0.75);
  transform: rotate(90deg);
}

/* Modal body */
.modal-body {
  padding: 28px 32px 36px;
}

.modal-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--mint);
  color: var(--sage);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 6px;
  margin-bottom: 10px;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 6px;
}

.modal-location {
  font-size: 0.85rem;
  color: var(--sage-mid);
  font-weight: 600;
  margin-bottom: 24px;
}

/* Meta stats row */
.modal-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}

.mstat {
  background: var(--surface);
  border: 1px solid var(--mint-dark);
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
}

.mstat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--sage);
  line-height: 1;
}

.mstat-key {
  font-size: 0.62rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* Section */
.msection {
  margin-bottom: 24px;
}

.msection-title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sage-mid);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.msection-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.msection p {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.75;
}

/* Progress */
.prog-track {
  height: 8px;
  background: var(--mint-dark);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 8px;
}

.prog-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--sage) 0%, var(--sage-light) 100%);
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
}

.prog-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 6px;
}

.prog-label strong { color: var(--ink); }

/* Timeline */
.timeline {
  position: relative;
  padding-left: 22px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 7px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--border);
  border-radius: 2px;
}

.tl-item {
  position: relative;
  padding-left: 20px;
  padding-bottom: 16px;
}

.tl-dot {
  position: absolute;
  left: -15px;
  top: 5px;
  width: 13px; height: 13px;
  border-radius: 50%;
  border: 2px solid var(--sage);
  background: white;
  transition: transform 0.2s;
}

.tl-dot.done { background: var(--sage); }
.tl-dot.current { background: var(--gold); border-color: #c8a100; animation: pulse 1.5s infinite; }

.tl-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--sage-mid);
  font-weight: 600;
  margin-bottom: 2px;
}

.tl-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
}

.tl-desc {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.5;
}

/* Team grid */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.team-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  transition: border-color 0.2s;
}

.team-card:hover { border-color: var(--sage-light); }

.team-avatar {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.team-name { font-size: 0.83rem; font-weight: 600; color: var(--ink); }
.team-role { font-size: 0.71rem; color: var(--muted); margin-top: 1px; }

/* Updates */
.updates-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.update-card {
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 14px;
  padding: 14px 16px;
  background: white;
}

.update-card.info    { border-left-color: #3b82f6; }
.update-card.success { border-left-color: #22c55e; }
.update-card.warning { border-left-color: #f59e0b; }

.update-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.update-badge {
  font-size: 0.64rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
}

.bi { background: #dbeafe; color: #1e40af; }
.bs { background: #dcfce7; color: #166534; }
.bw { background: #fef3c7; color: #92400e; }

.update-date { font-size: 0.71rem; color: var(--muted); }
.update-title { font-size: 0.85rem; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.update-desc { font-size: 0.79rem; color: var(--muted); line-height: 1.55; }
.update-author { font-size: 0.71rem; color: var(--sage-mid); margin-top: 6px; font-weight: 500; }

/* Gallery */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.gallery-cell {
  border-radius: 12px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: transform 0.15s;
}

.gallery-cell:hover { transform: scale(1.04); }

/* Tools in modal */
.modal-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.modal-tool {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 5px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: all 0.15s;
}

.modal-tool:hover {
  background: var(--mint);
  border-color: var(--sage-light);
  color: var(--sage);
}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .hero { padding: 60px 20px 48px; }

  .modal-body { padding: 22px 20px 28px; }
  .modal-title { font-size: 1.5rem; }
  .stats-strip { flex-direction: column; gap: 1px; }
}

<main class="main">
  <div class="toolbar" id="toolbar"></div>
  <div class="grid" id="projectGrid"></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-hero" id="modalHero"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>

<script>
// ── Status helpers ──
const STATUS_CLASS  = { active:"active", completed:"completed", ongoing:"ongoing" };
const STATUS_LABEL  = { active:"● Active", completed:"✓ Completed", ongoing:"⟳ Ongoing" };

// ── Stats strip ──
function renderStats() {
  const s = DB.stats();
  document.getElementById("statsStrip").innerHTML = `
    <div class="stat-cell"><div class="stat-num">${s.total}</div><div class="stat-lbl">Projects</div></div>
    <div class="stat-cell"><div class="stat-num">${s.active}</div><div class="stat-lbl">Active</div></div>
    <div class="stat-cell"><div class="stat-num">${s.totalArea} km²</div><div class="stat-lbl">Area Covered</div></div>
    <div class="stat-cell"><div class="stat-num">${s.updates}</div><div class="stat-lbl">Updates</div></div>`;
}

// ── Toolbar ──
let currentFilter = "All", currentSearch = "";

function renderToolbar() {
  const wrap = document.getElementById("toolbar");
  wrap.innerHTML = `
    <div class="search-box">
      <span class="search-ico">🔍</span>
      <input type="text" id="searchInput" placeholder="Search projects, regions, clients…" value="${currentSearch}">
    </div>
    <div class="filters">
      ${DB.getCategories().map(c=>`<button class="filter-pill ${c===currentFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join("")}
    </div>
    <span class="count-tag" id="countTag"></span>`;
  document.getElementById("searchInput").addEventListener("input", e => {
    currentSearch = e.target.value;
    renderGrid();
  });
}

function setFilter(cat) {
  currentFilter = cat;
  renderToolbar();
  renderGrid();
}

// ── Card builder ──
function buildCard(p, idx) {
  const lastUpd = p.updates[0];
  return `
  <div class="card" style="animation-delay:${idx * 0.07}s">
    <div class="card-scene">
      ${SCENES[p.scene]}
      <div class="scene-overlay"></div>
      <span class="badge-status ${STATUS_CLASS[p.status]}">${STATUS_LABEL[p.status]}</span>
      <span class="badge-id"><span class="live-dot"></span>${p.id}</span>
      <div class="scene-progress"><div class="scene-progress-fill" style="width:${p.progress}%"></div></div>
    </div>
    <div class="card-body">
      <span class="card-category">${p.category}</span>
      <div class="card-title">${p.title}</div>
      <div class="card-meta-row">
        <span class="meta-chip">📍 <strong>${p.region}</strong></span>
        <span class="meta-chip">📅 <strong>${p.year}</strong></span>
        <span class="meta-chip">⏱ <strong>${p.duration}</strong></span>
        <span class="meta-chip">📊 <strong>${p.progress}%</strong> complete</span>
      </div>
      <p class="card-desc">${p.description}</p>
      <div class="achievements">
        ${p.achievements.map(a=>`
        <div class="ach-item">
          <div class="ach-check"><svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></div>
          <span>${a}</span>
        </div>`).join("")}
      </div>
      <div class="db-record">
        <div class="db-record-head">⬡ DATABASE RECORD</div>
        <table>
          <tr><td>Project ID</td><td><code>${p.id}</code></td></tr>
          <tr><td>Client</td><td>${p.client}</td></tr>
          <tr><td>Budget</td><td>${p.budget}</td></tr>
          <tr><td>Area</td><td>${p.area_km2.toLocaleString()} km²</td></tr>
          <tr><td>Last Update</td><td style="color:var(--sage);font-weight:600">${lastUpd.date}</td></tr>
        </table>
      </div>
      <div class="tools-row">
        ${p.tools.map(t=>`<span class="tool-tag">${t}</span>`).join("")}
      </div>
      <div class="card-divider"></div>
      <button class="cta-btn" onclick="openModal('${p.id}')">
        <span>View Project</span>
        <span class="cta-right">
          <span class="cta-updates">${p.updates.length} updates</span>
          <span class="cta-arrow">→</span>
        </span>
      </button>
    </div>
  </div>`;
}

// ── Grid render ──
function renderGrid() {
  let projects = DB.getAll();
  if (currentFilter !== "All") projects = DB.getByCategory(currentFilter);
  if (currentSearch.trim()) {
    const q = currentSearch.toLowerCase();
    projects = projects.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      p.location.toLowerCase().includes(q) ||
      p.client.toLowerCase().includes(q) ||
      p.tags.some(t => t.includes(q))
    );
  }
  const ct = document.getElementById("countTag");
  if (ct) ct.textContent = `${projects.length} project${projects.length !== 1 ? "s" : ""} found`;
  const grid = document.getElementById("projectGrid");
  if (!projects.length) {
    grid.innerHTML = `<div class="no-results"><div class="nr-icon">🔍</div><p>No projects match "<strong>${currentSearch || currentFilter}</strong>".</p></div>`;
    return;
  }
  grid.innerHTML = projects.map((p, i) => buildCard(p, i)).join("");
}

// ── Modal ──
function openModal(id) {
  const p = DB.getById(id);
  if (!p) return;

  // Hero
  document.getElementById("modalHero").innerHTML = `
    ${SCENES[p.scene]}
    <button class="modal-close" onclick="closeModalBtn()">✕</button>`;

  // Timeline
  const tlHtml = p.timeline.map(t => `
    <div class="tl-item">
      <div class="tl-dot ${t.current ? 'current' : t.done ? 'done' : ''}"></div>
      <div class="tl-date">${t.date}</div>
      <div class="tl-title">${t.title}</div>
      <div class="tl-desc">${t.desc}</div>
    </div>`).join("");

  // Team
  const teamHtml = p.team.map(m => `
    <div class="team-card">
      <div class="team-avatar" style="background:${m.color}">${m.icon}</div>
      <div><div class="team-name">${m.name}</div><div class="team-role">${m.role}</div></div>
    </div>`).join("");

  // Updates
  const updateHtml = p.updates.map(u => `
    <div class="update-card ${u.type}">
      <div class="update-head">
        <span class="update-badge ${u.badgeClass}">${u.badge}</span>
        <span class="update-date">${u.date}</span>
      </div>
      <div class="update-title">${u.title}</div>
      <div class="update-desc">${u.desc}</div>
      <div class="update-author">👤 ${u.author}</div>
    </div>`).join("");

  // Gallery
  const galleryColors = ["#e8f7f5","#fef9e7","#e8f4fd","#fce8e8","#e8f5e9","#f3e8fd"];
  const galleryHtml = p.gallery.map((g, i) =>
    `<div class="gallery-cell" style="background:${galleryColors[i % galleryColors.length]}">${g}</div>`
  ).join("");

  document.getElementById("modalBody").innerHTML = `
    <span class="modal-tag">${p.category}</span>
    <div class="modal-title">${p.title}</div>
    <div class="modal-location">📍 ${p.location}</div>

    <div class="modal-stats">
      <div class="mstat"><div class="mstat-val">${p.budget}</div><div class="mstat-key">Budget</div></div>
      <div class="mstat"><div class="mstat-val">${p.duration}</div><div class="mstat-key">Duration</div></div>
      <div class="mstat"><div class="mstat-val">${p.area_km2.toLocaleString()}</div><div class="mstat-key">Area km²</div></div>
      <div class="mstat"><div class="mstat-val">${p.year}</div><div class="mstat-key">Started</div></div>
    </div>

    <div class="msection">
      <div class="msection-title">About This Project</div>
      <p>${p.description}</p>
    </div>

    <div class="msection">
      <div class="msection-title">Progress — ${p.progress}% Complete</div>
      <div class="prog-label"><strong>${p.title}</strong><span>${p.progress}%</span></div>
      <div class="prog-track"><div class="prog-fill" id="pfill_${p.id}" style="width:0%"></div></div>
    </div>

    <div class="msection">
      <div class="msection-title">Project Timeline</div>
      <div class="timeline">${tlHtml}</div>
    </div>

    <div class="msection">
      <div class="msection-title">Project Team</div>
      <div class="team-grid">${teamHtml}</div>
    </div>

    <div class="msection">
      <div class="msection-title">Latest Updates (${p.updates.length})</div>
      <div class="updates-list">${updateHtml}</div>
    </div>

    <div class="msection">
      <div class="msection-title">Tools & Technologies</div>
      <div class="modal-tools">${p.tools.map(t => `<span class="modal-tool">${t}</span>`).join("")}</div>
    </div>

    <div class="msection">
      <div class="msection-title">Project Gallery</div>
      <div class="gallery-grid">${galleryHtml}</div>
    </div>`;

  // Animate progress fill
  setTimeout(() => {
    const fill = document.getElementById(`pfill_${p.id}`);
    if (fill) fill.style.width = p.progress + "%";
  }, 120);

  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModalBtn();
});

// ── Boot ──
renderStats();
renderToolbar();
renderGrid();
</script>
</body>
</html>
